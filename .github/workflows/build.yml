name: Build & Release

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      # Rust toolchain
      - uses: dtolnay/rust-toolchain@stable

      # Cache Cargo registry + build artifacts
      - uses: Swatinem/rust-cache@v2

      # System libraries needed by eframe (xcb, xkbcommon) and rfd (xdg-portal via dbus)
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            pkg-config

      # ------------------------------------------------------------------ build
      - name: Build (release)
        run: cargo build --release

      # ------------------------------------------------------------------ artifact (every push)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tori_markdown_viewer-linux-x86_64
          path: target/release/tori_markdown_viewer
          if-no-files-found: error
          retention-days: 30

      # ------------------------------------------------------------------ release (tag only)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/tori_markdown_viewer
            README.md
